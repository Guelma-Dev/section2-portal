<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Section 2 - Groupe 12 | Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81' }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes countPop { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
    .fade-in { animation: fadeInUp 0.5s ease both; }
    .countdown-update { animation: countPop 0.3s ease; }
    body { -webkit-tap-highlight-color: transparent; }
    body.modal-open { overflow: hidden; }
    .scrollbar-thin::-webkit-scrollbar { width: 4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
    .dark .scrollbar-thin::-webkit-scrollbar-thumb { background: #475569; }
    #file-list a { word-break: break-all; }
    #modal-body { -webkit-overflow-scrolling: touch; overscroll-behavior: contain; touch-action: pan-y; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 font-sans antialiased transition-colors duration-200">

  <!-- Announcement Bar -->
  <div id="announcement-bar" class="hidden bg-gradient-to-r from-amber-500 to-orange-500 text-white text-center text-sm py-2 px-4"></div>

  <!-- Header -->
  <header class="bg-gradient-to-r from-primary-600 via-primary-700 to-indigo-900 dark:from-primary-800 dark:via-primary-900 dark:to-gray-900 text-white shadow-lg">
    <div class="max-w-6xl mx-auto px-4 py-5">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-xl md:text-3xl font-bold tracking-tight">📚 Section 2 - Groupe 12</h1>
          <p class="text-primary-200 text-xs md:text-sm mt-0.5">الموارد الأكاديمية والملفات الدراسية</p>
        </div>
        <button id="dark-toggle" class="w-9 h-9 rounded-full bg-white bg-opacity-20 hover:bg-opacity-30 flex items-center justify-center text-lg transition" title="الوضع المظلم">🌙</button>
      </div>
      <!-- Tabs -->
      <div class="flex gap-1 mt-4">
        <button id="tab-files" class="tab-btn px-5 py-2 rounded-lg text-sm font-medium bg-white text-primary-700 shadow-sm" onclick="switchTab('files')">📁 الملفات</button>
        <button id="tab-exams" class="tab-btn px-5 py-2 rounded-lg text-sm font-medium text-white bg-white bg-opacity-20 hover:bg-opacity-30" onclick="switchTab('exams')">📅 الامتحانات</button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6">

    <!-- Files Tab -->
    <div id="panel-files">
      <div class="flex items-center gap-3 mb-6">
        <span class="h-px flex-1 bg-gradient-to-r from-transparent via-gray-300 dark:via-gray-600 to-transparent"></span>
        <span class="text-gray-400 dark:text-gray-500 text-xs font-medium tracking-widest">المواد الدراسية</span>
        <span class="h-px flex-1 bg-gradient-to-r from-transparent via-gray-300 dark:via-gray-600 to-transparent"></span>
      </div>
      <div id="subjects-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
    </div>

    <!-- Exams Tab -->
    <div id="panel-exams" class="hidden">
      <div class="bg-gradient-to-br from-primary-600 via-primary-700 to-indigo-900 dark:from-primary-800 dark:via-primary-900 dark:to-gray-900 rounded-2xl shadow-xl p-5 md:p-6">
        <div class="flex items-center gap-3 mb-1">
          <span class="text-2xl md:text-3xl">📅</span>
          <h2 class="text-xl md:text-2xl font-bold text-white">جدول الامتحانات النهائية</h2>
        </div>
        <p class="text-primary-200 text-xs md:text-sm">الفترة الصباحية (08:30 - 10:30) • الفترة المسائية (14:00 - 16:00)</p>
        <div class="flex gap-2 mt-4">
          <button id="filter-all" class="px-4 py-1.5 rounded-full text-xs font-medium bg-white text-primary-700 shadow-md" onclick="filterExams('all')">الكل</button>
          <button id="filter-morning" class="px-4 py-1.5 rounded-full text-xs font-medium bg-white bg-opacity-20 text-white hover:bg-opacity-30" onclick="filterExams('صباحية')">صباحي</button>
          <button id="filter-evening" class="px-4 py-1.5 rounded-full text-xs font-medium bg-white bg-opacity-20 text-white hover:bg-opacity-30" onclick="filterExams('مسائية')">مسائي</button>
        </div>
      </div>
      <div id="exam-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mt-5"></div>
    </div>

    <footer class="mt-12 text-center text-gray-400 dark:text-gray-600 text-xs border-t border-gray-200 dark:border-gray-700 pt-6">
      تم إنشاء الموقع بواسطة <a href="https://t.me/vmw23" target="_blank" class="text-primary-600 dark:text-primary-400 hover:underline font-medium">@vmw23</a> &copy; 2026
    </footer>
  </main>

  <!-- Modal -->
  <div id="modal-overlay" class="fixed inset-0 bg-black bg-opacity-50 dark:bg-opacity-70 z-40 hidden" onclick="closeModal()"></div>
  <div id="modal" class="fixed inset-x-0 bottom-0 z-50 transform translate-y-full transition-transform duration-300 md:inset-y-0 md:right-0 md:left-auto md:w-3/4 lg:w-2/3 xl:w-1/2 md:translate-y-0 md:translate-x-full md:transition-transform md:duration-300 bg-white dark:bg-gray-800 rounded-t-2xl md:rounded-l-2xl shadow-2xl overflow-hidden" style="max-height:100dvh;">
    <div class="flex flex-col h-full">
      <div class="flex items-center justify-between bg-primary-700 dark:bg-primary-900 text-white px-5 py-4 shrink-0">
        <h2 id="modal-title" class="text-lg font-semibold truncate"></h2>
        <button onclick="closeModal()" class="text-white hover:text-primary-200 p-1">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="modal-body" class="flex-1 overflow-y-auto overscroll-contain p-4 md:p-5 scrollbar-thin min-h-0">
        <div id="modal-loading" class="text-center py-10 text-gray-400 dark:text-gray-500">جاري تحميل الملفات...</div>
        <div id="modal-content" class="hidden space-y-4"></div>
      </div>
    </div>
  </div>

  <script>
    const SUBJECTS = {{ subjects | tojson }};
    const EXAMS = {{ exams | tojson }};
    let allFiles = {};
    let countdownIntervals = [];
    const DAYS = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
    const MONTHS = ['يناير', 'فبراير', 'مارس', 'أبريل', 'ماي', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];

    function fmtDate(s) { const d = new Date(s + 'T00:00:00'); return DAYS[d.getDay()] + '، ' + d.getDate() + ' ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear(); }

    /* ── Dark Mode ── */
    if (localStorage.getItem('dark') === 'true' || (!localStorage.getItem('dark') && window.matchMedia('(prefers-color-scheme:dark)').matches)) {
      document.documentElement.classList.add('dark'); localStorage.setItem('dark','true');
    }
    document.getElementById('dark-toggle').addEventListener('click', () => {
      const dark = !document.documentElement.classList.toggle('dark');
      localStorage.setItem('dark', dark);
      document.getElementById('dark-toggle').textContent = dark ? '🌙' : '☀️';
    });
    document.getElementById('dark-toggle').textContent = document.documentElement.classList.contains('dark') ? '🌙' : '☀️';

    /* ── Tabs ── */
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => { b.className = 'tab-btn px-5 py-2 rounded-lg text-sm font-medium text-white bg-white bg-opacity-20 hover:bg-opacity-30'; });
      document.getElementById('panel-files').classList.toggle('hidden', tab !== 'files');
      document.getElementById('panel-exams').classList.toggle('hidden', tab !== 'exams');
      document.getElementById('tab-' + tab).className = 'tab-btn px-5 py-2 rounded-lg text-sm font-medium bg-white text-primary-700 shadow-sm';
    }

    /* ── Announcements ── */
    fetch('/api/announcements').then(r => r.json()).then(msgs => {
      if (msgs.length) {
        const bar = document.getElementById('announcement-bar');
        bar.classList.remove('hidden');
        bar.innerHTML = msgs.map(m => '<span class="mx-3">📢 ' + m + '</span>').join(' | ');
      }
    });

    /* ── Exams ── */
    function renderExams(filter) {
      clearInterval(...countdownIntervals);
      const grid = document.getElementById('exam-grid');
      grid.innerHTML = '';
      EXAMS.forEach((e, i) => {
        if (filter && filter !== 'all' && e.session !== filter) return;
        const d = new Date(e.date + 'T' + e.time + ':00');
        const p = d < new Date();
        const sc = e.session === 'صباحية' ? 'bg-amber-100 dark:bg-amber-900/40 text-amber-700 dark:text-amber-300' : 'bg-indigo-100 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-300';
        const card = document.createElement('div');
        card.className = 'fade-in bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-xl shadow-sm overflow-hidden';
        card.style.animationDelay = (i * 0.07) + 's';
        card.innerHTML = `<div class="p-4 ${p ? 'opacity-60' : ''}"><div class="flex justify-between items-start mb-2"><h3 class="font-bold text-gray-800 dark:text-gray-100 text-sm">${e.subject}</h3><span class="px-2 py-0.5 rounded-full text-xs font-medium ${sc}">${e.session}</span></div><p class="text-gray-500 dark:text-gray-400 text-xs mb-1">${fmtDate(e.date)}</p><p class="text-gray-400 dark:text-gray-500 text-xs mb-3">⏰ ${e.time}</p><div id="cd-${i}" class="flex gap-2">${p ? '<span class="text-red-500 dark:text-red-400 text-sm font-medium">✅ انتهى الامتحان</span>' : '<div class="flex-1 bg-gray-100 dark:bg-gray-700 rounded-lg p-2 text-center"><div class="text-lg font-bold text-primary-600 dark:text-primary-400" id="d-'+i+'">--</div><div class="text-[10px] text-gray-400 dark:text-gray-500">يوم</div></div><div class="flex-1 bg-gray-100 dark:bg-gray-700 rounded-lg p-2 text-center"><div class="text-lg font-bold text-primary-600 dark:text-primary-400" id="h-'+i+'">--</div><div class="text-[10px] text-gray-400 dark:text-gray-500">ساعة</div></div><div class="flex-1 bg-gray-100 dark:bg-gray-700 rounded-lg p-2 text-center"><div class="text-lg font-bold text-primary-600 dark:text-primary-400" id="m-'+i+'">--</div><div class="text-[10px] text-gray-400 dark:text-gray-500">دقيقة</div></div><div class="flex-1 bg-gray-100 dark:bg-gray-700 rounded-lg p-2 text-center"><div class="text-lg font-bold text-primary-600 dark:text-primary-400" id="s-'+i+'">--</div><div class="text-[10px] text-gray-400 dark:text-gray-500">ثانية</div></div>'}</div></div>`;
        grid.appendChild(card);
        if (!p) {
          const iv = setInterval(() => {
            const diff = d - new Date();
            if (diff <= 0) { document.getElementById('cd-'+i).innerHTML = '<span class="text-red-500 dark:text-red-400 text-sm font-medium">✅ انتهى الامتحان</span>'; clearInterval(iv); return; }
            const upd = (id, v) => { const el = document.getElementById(id); if (el) { const s = String(v).padStart(2,'0'); if (el.textContent !== s) { el.textContent = s; el.classList.remove('countdown-update'); void el.offsetWidth; el.classList.add('countdown-update'); } } };
            upd('d-'+i, Math.floor(diff/86400000)); upd('h-'+i, Math.floor((diff%86400000)/3600000)); upd('m-'+i, Math.floor((diff%3600000)/60000)); upd('s-'+i, Math.floor((diff%60000)/1000));
          }, 1000);
          countdownIntervals.push(iv);
        }
      });
    }

    function filterExams(f) {
      document.querySelectorAll('[id^="filter-"]').forEach(b => b.className = 'px-4 py-1.5 rounded-full text-xs font-medium bg-white bg-opacity-20 text-white hover:bg-opacity-30');
      const b = document.getElementById(f === 'all' ? 'filter-all' : f === 'صباحية' ? 'filter-morning' : 'filter-evening');
      if (b) b.className = 'px-4 py-1.5 rounded-full text-xs font-medium bg-white text-primary-700 shadow-md';
      renderExams(f);
    }

    /* ── Subject Cards ── */
    const C = [{bg:'bg-blue-50 dark:bg-blue-900/30',border:'border-blue-200 dark:border-blue-700',icon:'text-blue-500 dark:text-blue-400',h:'hover:border-blue-400 dark:hover:border-blue-500 hover:shadow-blue-100 dark:hover:shadow-blue-900/30'},{bg:'bg-indigo-50 dark:bg-indigo-900/30',border:'border-indigo-200 dark:border-indigo-700',icon:'text-indigo-500 dark:text-indigo-400',h:'hover:border-indigo-400 dark:hover:border-indigo-500 hover:shadow-indigo-100'},{bg:'bg-emerald-50 dark:bg-emerald-900/30',border:'border-emerald-200 dark:border-emerald-700',icon:'text-emerald-500 dark:text-emerald-400',h:'hover:border-emerald-400 dark:hover:border-emerald-500 hover:shadow-emerald-100'},{bg:'bg-amber-50 dark:bg-amber-900/30',border:'border-amber-200 dark:border-amber-700',icon:'text-amber-500 dark:text-amber-400',h:'hover:border-amber-400 dark:hover:border-amber-500 hover:shadow-amber-100'},{bg:'bg-rose-50 dark:bg-rose-900/30',border:'border-rose-200 dark:border-rose-700',icon:'text-rose-500 dark:text-rose-400',h:'hover:border-rose-400 dark:hover:border-rose-500 hover:shadow-rose-100'},{bg:'bg-purple-50 dark:bg-purple-900/30',border:'border-purple-200 dark:border-purple-700',icon:'text-purple-500 dark:text-purple-400',h:'hover:border-purple-400 dark:hover:border-purple-500 hover:shadow-purple-100'},{bg:'bg-cyan-50 dark:bg-cyan-900/30',border:'border-cyan-200 dark:border-cyan-700',icon:'text-cyan-500 dark:text-cyan-400',h:'hover:border-cyan-400 dark:hover:border-cyan-500 hover:shadow-cyan-100'},{bg:'bg-teal-50 dark:bg-teal-900/30',border:'border-teal-200 dark:border-teal-700',icon:'text-teal-500 dark:text-teal-400',h:'hover:border-teal-400 dark:hover:border-teal-500 hover:shadow-teal-100'},{bg:'bg-orange-50 dark:bg-orange-900/30',border:'border-orange-200 dark:border-orange-700',icon:'text-orange-500 dark:text-orange-400',h:'hover:border-orange-400 dark:hover:border-orange-500 hover:shadow-orange-100'}];
    function gi(n) { return n.slice(0,2); }

    function renderCards() {
      const g = document.getElementById('subjects-grid');
      g.innerHTML = SUBJECTS.map((s, i) => { const c = C[i%9]; return `<button onclick="openModal('${s.replace(/'/g,"\\'")}')" class="group text-right ${c.bg} ${c.border} ${c.h} border-2 rounded-xl p-5 shadow-sm hover:shadow-md transition-all focus:outline-none focus:ring-2 focus:ring-primary-500"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-lg ${c.icon} bg-white dark:bg-gray-800 bg-opacity-80 flex items-center justify-center text-sm font-bold shadow-sm flex-shrink-0">${gi(s)}</div><span class="font-medium text-gray-800 dark:text-gray-100 text-sm">${s}</span></div><div class="mt-3 flex items-center text-xs ${c.icon} gap-1"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg> عرض الملفات</div></button>`; }).join('');
    }

    /* ── Modal ── */
    async function openModal(s) {
      document.getElementById('modal-title').textContent = s;
      document.getElementById('modal-content').classList.add('hidden');
      document.getElementById('modal-loading').classList.remove('hidden');
      document.getElementById('modal-overlay').classList.remove('hidden');
      const m = document.getElementById('modal');
      m.classList.remove('translate-y-full','md:translate-x-full');
      m.classList.add('translate-y-0','md:translate-x-0');
      document.body.classList.add('modal-open');
      if (!Object.keys(allFiles).length) { try { const r = await fetch('/api/files'); allFiles = await r.json(); } catch(e) {} }
      renderModal(s);
    }

    function closeModal() {
      const m = document.getElementById('modal');
      m.classList.remove('translate-y-0','md:translate-x-0');
      m.classList.add('translate-y-full','md:translate-x-full');
      document.getElementById('modal-overlay').classList.add('hidden');
      document.body.classList.remove('modal-open');
    }

    function renderModal(s) {
      const c = document.getElementById('modal-content'), l = document.getElementById('modal-loading');
      const f = allFiles[s], cats = ['Cours','TD','TP','Summary'];
      c.innerHTML = ''; let h = false;
      cats.forEach(cat => {
        const items = f && f[cat] ? f[cat] : []; h = h || items.length > 0;
        const sec = document.createElement('div');
        if (!items.length) {
          sec.innerHTML = `<div class="border-r-4 border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-800/50 rounded-l-lg p-4"><h3 class="font-semibold text-gray-400 dark:text-gray-500 text-sm">${cat}</h3><p class="text-gray-300 dark:text-gray-600 text-xs mt-1">لا توجد ملفات بعد.</p></div>`;
        } else {
          const cc = {Cours:'border-r-blue-500 bg-blue-50 dark:bg-blue-900/20',TD:'border-r-emerald-500 bg-emerald-50 dark:bg-emerald-900/20',TP:'border-r-amber-500 bg-amber-50 dark:bg-amber-900/20',Summary:'border-r-purple-500 bg-purple-50 dark:bg-purple-900/20'};
          const ch = {Cours:'text-blue-700 dark:text-blue-300',TD:'text-emerald-700 dark:text-emerald-300',TP:'text-amber-700 dark:text-amber-300',Summary:'text-purple-700 dark:text-purple-300'};
          const rows = items.map((x, idx) => {
            const pdf = x.original.toLowerCase().endsWith('.pdf');
            return `<tr class="${idx%2===0?'bg-white dark:bg-gray-800/50':'bg-gray-50 dark:bg-gray-800/30'} hover:bg-gray-100 dark:hover:bg-gray-700/50"><td class="px-3 py-2.5 text-xs text-gray-700 dark:text-gray-200" style="word-break:break-word;max-width:0">${pdf ? '<svg class="w-3.5 h-3.5 text-red-500 inline shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg> ' : ''}${x.original}</td><td class="px-1 py-2.5 text-left whitespace-nowrap"><a href="${x.url}" target="_blank" class="text-primary-600 dark:text-primary-400 hover:text-primary-800 dark:hover:text-primary-300 p-1.5 inline-block" title="عرض"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg></a><a href="${x.download_url}" class="text-primary-600 dark:text-primary-400 hover:text-primary-800 dark:hover:text-primary-300 p-1.5 inline-block" title="تحميل"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></a></td></tr>`;
          }).join('');
          sec.innerHTML = `<div class="border-r-4 ${cc[cat]} rounded-l-lg overflow-hidden"><div class="px-4 py-3 ${ch[cat]}"><h3 class="font-semibold text-sm">${cat}</h3></div><div class="overflow-x-auto"><table class="w-full text-sm"><tbody>${rows}</tbody></table></div></div>`;
        }
        c.appendChild(sec);
      });
      if (!h) c.innerHTML = '<div class="text-center py-10 text-gray-400 dark:text-gray-500">لا توجد ملفات مرفوعة بعد لهذه المادة.</div>';
      l.classList.add('hidden'); c.classList.remove('hidden');
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    renderExams('all');
    renderCards();
  </script>
</body>
</html>
